services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: specwriter
      POSTGRES_PASSWORD: devpassword
      POSTGRES_DB: specwriter_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U specwriter']
      interval: 10s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - '1025:1025'  # SMTP
      - '8025:8025'  # Web UI
    environment:
      MP_SMTP_AUTH_ACCEPT_ANY: '1'
      MP_SMTP_AUTH_ALLOW_INSECURE: '1'

volumes:
  postgres_data:
